<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#0A0A0A"/>
    </marker>
  </defs>
  <rect width="1200" height="430" fill="#FAFAF9"/>

  <text x="50" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2.5" fill="#78716C">ENFORCEMENT</text>
  <text x="50" y="80" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#57534E">The rules bind. They are not suggestions.</text>

  <!-- an edit -->
  <text x="50" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#A8A29E">AN EDIT</text>
  <rect x="50" y="152" width="176" height="78" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="138" y="196" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#0A0A0A">a file edit</text>

  <line x1="226" y1="191" x2="286" y2="191" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- the gate -->
  <text x="300" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#6C5CE7">THE GATE</text>
  <rect x="300" y="152" width="250" height="150" rx="12" fill="#FFFFFF" stroke="#6C5CE7" stroke-width="2"/>
  <text x="425" y="188" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#0A0A0A">validate.mjs</text>
  <text x="322" y="222" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#57534E">no fetch or DB outside a gateway</text>
  <text x="322" y="248" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#57534E">no tool calls another tool</text>
  <text x="322" y="274" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#57534E">everything is registered</text>

  <!-- pass -->
  <line x1="550" y1="176" x2="628" y2="150" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="640" y="126" width="230" height="52" rx="10" fill="#F3F0FE" stroke="#6C5CE7" stroke-opacity="0.4"/>
  <text x="662" y="158" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#0A0A0A"><tspan font-weight="700" fill="#6C5CE7">PASS</tspan><tspan dx="10">the edit is kept</tspan></text>

  <!-- fail -->
  <line x1="550" y1="266" x2="628" y2="292" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="640" y="266" width="300" height="52" rx="10" fill="none" stroke="#A8A29E" stroke-width="1.2" stroke-dasharray="4 5"/>
  <text x="662" y="298" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#57534E"><tspan font-weight="700" fill="#78716C">FAIL</tspan><tspan dx="10">blocked, with the reason</tspan></text>

  <!-- triggers -->
  <text x="50" y="356" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#A8A29E">IT RUNS</text>
  <rect x="50" y="368" width="440" height="36" rx="9" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="70" y="391" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#0A0A0A">hook &#183; on every accepted edit, in session</text>
  <rect x="506" y="368" width="420" height="36" rx="9" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="526" y="391" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#0A0A0A">backstop &#183; git pre-commit and CI</text>
</svg>
