<svg viewBox="0 0 1240 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#0A0A0A"/>
    </marker>
  </defs>
  <rect width="1240" height="540" fill="#FAFAF9"/>

  <text x="50" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2.5" fill="#78716C">ONE COMMAND: /nyyon</text>
  <text x="50" y="80" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#57534E">Describe what you want. It plans across the five layers, then builds each piece in order.</text>

  <!-- ZONE A: you type -->
  <text x="50" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#A8A29E">YOU TYPE</text>
  <rect x="50" y="138" width="252" height="110" rx="12" fill="#FFFFFF" stroke="#6C5CE7" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="72" y="182" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#6C5CE7">/nyyon</text>
  <text x="72" y="214" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#0A0A0A">add a billing area</text>

  <line x1="302" y1="193" x2="348" y2="193" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ZONE B: it plans -->
  <text x="360" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#A8A29E">IT PLANS</text>
  <rect x="360" y="138" width="360" height="252" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <text x="384" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#78716C">GATEWAY</text>
  <text x="520" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#0A0A0A">stripe</text>
  <text x="384" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#78716C">TOOL</text>
  <text x="520" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#0A0A0A">create_charge</text>
  <text x="384" y="260" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#78716C">WORKFLOW</text>
  <text x="520" y="260" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#0A0A0A">run_checkout</text>
  <text x="384" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#78716C">MODULE</text>
  <text x="520" y="300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#0A0A0A">Billing + screen</text>
  <text x="384" y="340" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#78716C">KNOWLEDGE</text>
  <text x="520" y="340" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#0A0A0A">pricing rules</text>

  <line x1="720" y1="250" x2="766" y2="250" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ZONE C: it builds, in order -->
  <text x="780" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#A8A29E">IT BUILDS, IN ORDER</text>
  <rect x="780" y="138" width="410" height="252" rx="12" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
  <line x1="812" y1="176" x2="812" y2="312" stroke="#E7E5E4" stroke-width="1.5"/>

  <circle cx="812" cy="176" r="12" fill="#6C5CE7"/>
  <text x="812" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
  <text x="838" y="181" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0A0A0A">Gateways</text>
  <text x="1150" y="181" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6C5CE7">validate</text>

  <circle cx="812" cy="221" r="12" fill="#6C5CE7"/>
  <text x="812" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
  <text x="838" y="226" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0A0A0A">Tools</text>
  <text x="1150" y="226" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6C5CE7">validate</text>

  <circle cx="812" cy="266" r="12" fill="#6C5CE7"/>
  <text x="812" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
  <text x="838" y="271" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0A0A0A">Workflows</text>
  <text x="1150" y="271" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6C5CE7">validate</text>

  <circle cx="812" cy="311" r="12" fill="#6C5CE7"/>
  <text x="812" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
  <text x="838" y="316" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0A0A0A">Modules + surfaces</text>
  <text x="1150" y="316" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6C5CE7">validate</text>

  <text x="800" y="366" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#78716C">checkpoint before apply &#183; reuse what already exists</text>

  <!-- activity bus -->
  <rect x="50" y="470" width="1140" height="36" rx="10" fill="#0A0A0A"/>
  <circle cx="76" cy="488" r="4" fill="#6C5CE7"/>
  <text x="92" y="493" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" letter-spacing="1" fill="#FAFAF9">ACTIVITY &#183; every step logged, then /nyyon-map shows the result</text>
</svg>
